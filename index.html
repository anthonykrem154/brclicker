  <style>
    :root{
      --bg:#06110b;
      --panel:#0b2214;
      --panel2:#0f2a19;
      --card:#0a0f0c;
      --card2:#0c120f;
      --accent:#00d14a;
      --accent2:#ff0022;
      --text:#eafff1;
      --muted:#a4cdb2;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Press Start 2P", system-ui;
      color:var(--text);
      background:
        linear-gradient(180deg, #064681 0%, #2a08695d 100%);
      overflow-x:hidden;
    }

    /* Top HUD */
    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      padding:18px 18px 10px;
    }
    .hudLeft{
      display:flex;
      gap:14px;
      align-items:flex-end;
      min-width: 260px;
    }
    .miniLogo{
      width:56px;
      height:56px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.14), transparent 55%),
                  linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
      border:3px solid rgba(255, 255, 255, 0.45);
      box-shadow: var(--shadow);
      font-size:22px;
      user-select:none;
    }
    .statBlock{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom:4px;
    }
    .bigCount{
      font-size:48px;
      line-height:1;
      letter-spacing:2px;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
    }
    .subStats{
      font-size:16px;
      color:var(--text);
      opacity:.95;
      letter-spacing:1px;
    }

    .recordBar{
      margin: 0 18px 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background-color: rgb(255, 255, 255);
      color:#021108;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Layout like screenshot: left click zone + right shop */
    .layout{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:18px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .clickZone{
      position:relative;
      min-height: 560px;
      border-radius: 0px; /* screenshot is square */
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.20), transparent 55%),
        conic-gradient(from 0deg, rgba(255,255,255,.18), rgba(255, 255, 255, 0.2), rgba(255,255,255,.12), rgba(255, 255, 255, 0.18), rgba(255,255,255,.14));
      box-shadow: var(--shadow);
      border: 4px solid rgba(255, 255, 255, 0.35);
    }

    .clickBtn{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background: transparent;
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      outline:none;
    }

    /* Big “brainrot” logo */
    .rotWrap{
      width:min(520px, 80%);
      aspect-ratio: 1 / 1;
      display:grid;
      place-items:center;
      position:relative;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.45));
    }

    .rotText{
      position:absolute;
      bottom: -12px;
      font-size: 14px;
      color: rgba(2,17,8,.95);
      background: rgba(168, 132, 11, 0.75);
      padding:10px 12px;
      border-radius: 14px;
      border: 3px solid rgba(0,0,0,.18);
      letter-spacing: 1px;
    }

    .float{
      position:fixed;
      pointer-events:none;
      font-weight:900;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
      transform: translate(-50%,-50%);
      animation: up .75s ease forwards;
      z-index:999;
    }
    @keyframes up{
      from{opacity:0; transform:translate(-50%,-10%) scale(.95)}
      20%{opacity:1}
      to{opacity:0; transform:translate(-50%,-90%) scale(1.05)}
    }

    /* Shop */
    .shop{
      position:relative;
      background: rgba(0,0,0,.12);
      border-radius: 22px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      max-height: 590px;
      overflow:auto;
    }
    .shop::-webkit-scrollbar{width:10px}
    .shop::-webkit-scrollbar-thumb{background: rgba(255,255,255,.18); border-radius:10px}
    .shop::-webkit-scrollbar-track{background: rgba(0,0,0,.18); border-radius:10px}

    .card{
      display:flex;
      gap:12px;
      align-items:center;
      padding: 14px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(10, 1, 41, 0.92), rgba(3, 6, 17, 0.92));
      border: 2px solid rgba(255,255,255,.10);
      margin-bottom: 12px;
    }
    .icon{
      width:64px;
      height:64px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: rgba(5, 112, 173, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      font-size:28px;
      user-select:none;
      flex:0 0 auto;
    }
    .main{
      flex:1;
      min-width: 0;
    }
    .name{
      font-size:18px;
      letter-spacing:1px;
      margin-bottom:8px;
    }
    .desc{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:14px;
      color: rgba(234,255,241,.85);
      line-height:1.25;
    }
    .buy{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      min-width: 150px;
    }
    .btn{
      font-family: "Press Start 2P", system-ui;
      font-size:14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.0);
      color: var(--text);
      cursor:pointer;
      transition: transform .08s ease, filter .2s ease;
      width: 100%;
      text-align:center;
    }
    .btn:hover{filter: brightness(1.08)}
    .btn:active{transform: translateY(1px)}
    .btn:disabled{opacity:.45; cursor:not-allowed; filter:none}

    .rowBtns{
      display:flex;
      gap:10px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .smallBtn{
      font-family: "Press Start 2P", system-ui;
      font-size:12px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: rgba(234,255,241,.9);
      cursor:pointer;
    }

    @media (max-width: 980px){
      .layout{grid-template-columns: 1fr; }
      .shop{max-height: none}
      .bigCount{font-size:40px}
    }

  setTimeout(()=> el.remove(), 3000);
}


    function owned(id){ return state.owned[id] || 0; }

    function cost(item){
      const c = owned(item.id);
      return Math.floor(item.baseCost * Math.pow(item.growth, c));
    }



    function recompute(){
      // click power = base + cursor upgrades, times multipliers
      const cursorCount = owned("cursor");
      state.clickPower = (1 + cursorCount) * state.clickMult;

      // bps from auto + mine + valk
      const auto = owned("auto") * 1;
      const mine = owned("mine") * 10;
      const valk = owned("valk") * 100;
      state.bps = auto + mine + valk;

      // record
      if (state.brainrot > state.record) state.record = state.brainrot;
    }

    function render(){
      elCount.textContent = fmt(state.brainrot);
      elBps.textContent = fmt(state.bps);

      elRecordBar.textContent = `RECORD: 999999999999999999 BRAINROT BY: ANTHONY`;

      // shop
      shopEl.innerHTML = "";
      ITEMS.forEach(item=>{
        const price = cost(item);
        const count = owned(item.id);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="icon">${item.icon}</div>
          <div class="main">
            <div class="name">${item.name}</div>
            <div class="desc">${item.desc}</div>
            <div class="desc" style="margin-top:8px; color: rgba(164,205,178,.9);">
              Owned: ${count}
            </div>
          </div>
          <div class="buy">
            <button class="btn" ${state.brainrot < price ? "disabled" : ""}>
              Buy for ${fmt(price)}
            </button>
          </div>
        `;

        card.querySelector("button").onclick = () => buy(item);
        shopEl.appendChild(card);
      });
    }

    function floatText(text, x, y){
      const el = document.createElement("div");
      el.className = "float";
      el.textContent = text;
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.fontSize = "18px";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 800);
    }

function clickGain(e){
  const rect = clickZone.getBoundingClientRect();
  const x = e?.clientX ?? (rect.left + rect.width/2);
  const y = e?.clientY ?? (rect.top + rect.height/2);

  let gain = state.clickPower;

  if(Math.random() < 0.1){
    gain *= 5;
    floatText("Nice!", x, y - 30);
  }

  state.brainrot += gain;

  // ✅ ADD THESE
  state.totalClicks += 1;
  state.totalEarned += gain;
  if(gain > state.bestClick) state.bestClick = gain;

  checkAchievements();

  floatText(`+${fmt(gain)}`, x, y);
  render();

  // ✅ update stats if open
  if(statsPopup.style.display === "block") renderStats();
}

    function buy(item){
      const price = cost(item);
      if (state.brainrot < price) return;

      state.brainrot -= price;
      state.owned[item.id] = owned(item.id) + 1;

      if (item.type === "click"){
        // handled by recompute via cursor count
      } else if (item.type === "bps"){
        // handled by recompute via counts
      } else if (item.type === "click_mult"){
        // multiply click mult each purchase
        state.clickMult *= item.value;
        state.clickMult = clamp(state.clickMult, 1, 1024);
      }

      recompute();
      render();
    }

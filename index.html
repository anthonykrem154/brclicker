<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Brainrot Clicker</title>

  <!-- Pixel-ish font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#06110b;
      --panel:#0b2214;
      --panel2:#0f2a19;
      --card:#0a0f0c;
      --card2:#0c120f;
      --accent:#00d14a;
      --accent2:#ff0022;
      --text:#eafff1;
      --muted:#a4cdb2;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Press Start 2P", system-ui;
      color:var(--text);
      background:
        linear-gradient(180deg, #064681 0%, #2a08695d 100%);
      overflow-x:hidden;
    }

    /* Top HUD */
    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      padding:18px 18px 10px;
    }
    
    .hudLeft{
      display:flex;
      gap:14px;
      align-items:flex-end;
      min-width: 260px;
    }
    .miniLogo{
      width:56px;
      height:56px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.14), transparent 55%),
                  linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
      border:3px solid rgba(255, 255, 255, 0.45);
      box-shadow: var(--shadow);
      font-size:22px;
      user-select:none;
    }
    .statBlock{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom:4px;
    }
    .bigCount{
      font-size:48px;
      line-height:1;
      letter-spacing:2px;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
    }
    .subStats{
      font-size:16px;
      color:var(--text);
      opacity:.95;
      letter-spacing:1px;
    }

    .recordBar{
      margin: 0 18px 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background-color: rgb(255, 255, 255);
      color:#021108;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Layout like screenshot: left click zone + right shop */
    .layout{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:18px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .clickZone{
      position:relative;
      min-height: 560px;
      border-radius: 0px; /* screenshot is square */
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.20), transparent 55%),
        conic-gradient(from 0deg, rgba(255,255,255,.18), rgba(255, 255, 255, 0.2), rgba(255,255,255,.12), rgba(255, 255, 255, 0.18), rgba(255,255,255,.14));
      box-shadow: var(--shadow);
      border: 4px solid rgba(255, 255, 255, 0.35);
    }

    .clickBtn{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background: transparent;
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      outline:none;
    }

    /* Big “brainrot” logo */
    .rotWrap{
      width:min(520px, 80%);
      aspect-ratio: 1 / 1;
      display:grid;
      place-items:center;
      position:relative;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.45));
    }

    .rotText{
      position:absolute;
      bottom: -12px;
      font-size: 14px;
      color: rgba(2,17,8,.95);
      background: rgba(168, 132, 11, 0.75);
      padding:10px 12px;
      border-radius: 14px;
      border: 3px solid rgba(0,0,0,.18);
      letter-spacing: 1px;
    }

    .float{
      position:fixed;
      pointer-events:none;
      font-weight:900;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
      transform: translate(-50%,-50%);
      animation: up .75s ease forwards;
      z-index:999;
    }
    @keyframes up{
      from{opacity:0; transform:translate(-50%,-10%) scale(.95)}
      20%{opacity:1}
      to{opacity:0; transform:translate(-50%,-90%) scale(1.05)}
    }

    /* Shop */
    .shop{
      position:relative;
      background: rgba(0,0,0,.12);
      border-radius: 22px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      max-height: 590px;
      overflow:auto;
    }
    .shop::-webkit-scrollbar{width:10px}
    .shop::-webkit-scrollbar-thumb{background: rgba(255,255,255,.18); border-radius:10px}
    .shop::-webkit-scrollbar-track{background: rgba(0,0,0,.18); border-radius:10px}

    .card{
      display:flex;
      gap:12px;
      align-items:center;
      padding: 14px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(10, 1, 41, 0.92), rgba(3, 6, 17, 0.92));
      border: 2px solid rgba(255,255,255,.10);
      margin-bottom: 12px;
    }
    .icon{
      width:64px;
      height:64px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: rgba(5, 112, 173, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      font-size:28px;
      user-select:none;
      flex:0 0 auto;
    }
    .main{
      flex:1;
      min-width: 0;
    }
    .name{
      font-size:18px;
      letter-spacing:1px;
      margin-bottom:8px;
    }
    .desc{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:14px;
      color: rgba(234,255,241,.85);
      line-height:1.25;
    }
    .buy{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      min-width: 150px;
    }
    .btn{
      font-family: "Press Start 2P", system-ui;
      font-size:14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.0);
      color: var(--text);
      cursor:pointer;
      transition: transform .08s ease, filter .2s ease;
      width: 100%;
      text-align:center;
    }
    .btn:hover{filter: brightness(1.08)}
    .btn:active{transform: translateY(1px)}
    .btn:disabled{opacity:.45; cursor:not-allowed; filter:none}

    .rowBtns{
      display:flex;
      gap:10px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .smallBtn{
      font-family: "Press Start 2P", system-ui;
      font-size:12px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: rgba(234,255,241,.9);
      cursor:pointer;
    }

    @media (max-width: 980px){
      .layout{grid-template-columns: 1fr; }
      .shop{max-height: none}
      .bigCount{font-size:40px}
    }
    .rotWrap{
  position: relative;
  width: 100%;
  height: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 3) Add this CSS (for the image icon inside the circle) */
.shopIconImg{
  width: 60px;
  height: 65px;
  object-fit: contain;        /* makes black svg white */
  pointer-events: none;
  user-select: none;
}

.charSwitch{
  position:absolute;
  right:14px;
  top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:5;
}

.charSwitch button{
  font-family:"Press Start 2P", system-ui;
  font-size:10px;
  padding:10px 12px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.25);
  color: #fff;
  cursor:pointer;
}
.charSwitch button:hover{
  background: rgba(255,255,255,.20);
}

@keyframes fadeInOut{
  0% {opacity:0; transform:translate(-50%, -30%) scale(.9);}
  10%,80% {opacity:1; transform:translate(-50%, 0%) scale(1);}
  100% {opacity:0; transform:translate(-50%, 10%) scale(1.1);}
}
#overlay{
  position:fixed;
  inset:0;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.3);
  display:none;
  z-index:9998;
}

@media (max-width: 900px){

    align-items: stretch;

  }

  .hudLeft{

  }

  }

    font-size: 11px;

  .name{

  #statsPopup,
  #adminPasswordPopup > div,

  }

  }

  #adminConsole{

  }

}

    adminSuggestions.innerHTML = "";
    return;
  }

  const matches = ADMIN_COMMANDS.filter(cmd => cmd.startsWith(q));

    return;

  }

  else if(cmd === "fix"){
    document.body.classList.remove("shake-active");
    recompute();
    render();
    if(statsPopup.style.display === "block") renderStats();
    logAdmin("game fixed");
  }

  else if(cmd === "statsmax"){
    state.totalClicks = 999999;
    state.totalEarned = 999999999;
    state.bestClick = 999999;
    if(statsPopup.style.display === "block") renderStats();
    logAdmin("stats maxed");
  }

  else if(cmd === "statsreset"){
    state.totalClicks = 0;
    state.totalEarned = 0;
    state.bestClick = 0;
    if(statsPopup.style.display === "block") renderStats();
    logAdmin("stats reset");
  }

  else if(cmd === "reset"){
    state.brainrot = 0;
    state.record = 0;
    state.bps = 0;
    state.achievements = {};
    state.clickPower = 1;
    state.clickMult = 1;
    state.owned = {};
    state.unlockedChars = { tung: true };
    state.totalClicks = 0;
    state.totalEarned = 0;
    state.bestClick = 0;

    recompute();
    render();
    if(statsPopup.style.display === "block") renderStats();
    logAdmin("full game reset");
  }

  else{
    logAdmin("unknown command");
  }
}

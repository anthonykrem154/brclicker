<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Brainrot Clicker</title>

  <!-- Pixel-ish font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#06110b;
      --panel:#0b2214;
      --panel2:#0f2a19;
      --card:#0a0f0c;
      --card2:#0c120f;
      --accent:#00d14a;
      --accent2:#ff0022;
      --text:#eafff1;
      --muted:#a4cdb2;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Press Start 2P", system-ui;
      color:var(--text);
      background:
        linear-gradient(180deg, #064681 0%, #2a08695d 100%);
      overflow-x:hidden;
    }

    /* Top HUD */
    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      padding:18px 18px 10px;
    }
    
    .hudLeft{
      display:flex;
      gap:14px;
      align-items:flex-end;
      min-width: 260px;
    }
    .miniLogo{
      width:56px;
      height:56px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.14), transparent 55%),
                  linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
      border:3px solid rgba(255, 255, 255, 0.45);
      box-shadow: var(--shadow);
      font-size:22px;
      user-select:none;
    }
    .statBlock{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom:4px;
    }
    .bigCount{
      font-size:48px;
      line-height:1;
      letter-spacing:2px;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
    }
    .subStats{
      font-size:16px;
      color:var(--text);
      opacity:.95;
      letter-spacing:1px;
    }

    .recordBar{
      margin: 0 18px 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background-color: rgb(255, 255, 255);
      color:#021108;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Layout like screenshot: left click zone + right shop */
    .layout{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:18px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .clickZone{
      position:relative;
      min-height: 560px;
      border-radius: 0px; /* screenshot is square */
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.20), transparent 55%),
        conic-gradient(from 0deg, rgba(255,255,255,.18), rgba(255, 255, 255, 0.2), rgba(255,255,255,.12), rgba(255, 255, 255, 0.18), rgba(255,255,255,.14));
      box-shadow: var(--shadow);
      border: 4px solid rgba(255, 255, 255, 0.35);
    }

    .clickBtn{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background: transparent;
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      outline:none;
    }

    /* Big “brainrot” logo */
    .rotWrap{
      width:min(520px, 80%);
      aspect-ratio: 1 / 1;
      display:grid;
      place-items:center;
      position:relative;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.45));
    }

    .rotText{
      position:absolute;
      bottom: -12px;
      font-size: 14px;
      color: rgba(2,17,8,.95);
      background: rgba(168, 132, 11, 0.75);
      padding:10px 12px;
      border-radius: 14px;
      border: 3px solid rgba(0,0,0,.18);
      letter-spacing: 1px;
    }

    .float{
      position:fixed;
      pointer-events:none;
      font-weight:900;
      text-shadow: 0 10px 25px rgba(0,0,0,.55);
      transform: translate(-50%,-50%);
      animation: up .75s ease forwards;
      z-index:999;
    }
    @keyframes up{
      from{opacity:0; transform:translate(-50%,-10%) scale(.95)}
      20%{opacity:1}
      to{opacity:0; transform:translate(-50%,-90%) scale(1.05)}
    }

    /* Shop */
    .shop{
      position:relative;
      background: rgba(0,0,0,.12);
      border-radius: 22px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      max-height: 590px;
      overflow:auto;
    }
    .shop::-webkit-scrollbar{width:10px}
    .shop::-webkit-scrollbar-thumb{background: rgba(255,255,255,.18); border-radius:10px}
    .shop::-webkit-scrollbar-track{background: rgba(0,0,0,.18); border-radius:10px}

    .card{
      display:flex;
      gap:12px;
      align-items:center;
      padding: 14px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(10, 1, 41, 0.92), rgba(3, 6, 17, 0.92));
      border: 2px solid rgba(255,255,255,.10);
      margin-bottom: 12px;
    }
    .icon{
      width:64px;
      height:64px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: rgba(5, 112, 173, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      font-size:28px;
      user-select:none;
      flex:0 0 auto;
    }
    .main{
      flex:1;
      min-width: 0;
    }
    .name{
      font-size:18px;
      letter-spacing:1px;
      margin-bottom:8px;
    }
    .desc{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:14px;
      color: rgba(234,255,241,.85);
      line-height:1.25;
    }
    .buy{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      min-width: 150px;
    }
    .btn{
      font-family: "Press Start 2P", system-ui;
      font-size:14px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.0);
      color: var(--text);
      cursor:pointer;
      transition: transform .08s ease, filter .2s ease;
      width: 100%;
      text-align:center;
    }
    .btn:hover{filter: brightness(1.08)}
    .btn:active{transform: translateY(1px)}
    .btn:disabled{opacity:.45; cursor:not-allowed; filter:none}

    .rowBtns{
      display:flex;
      gap:10px;
      padding: 0 18px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .smallBtn{
      font-family: "Press Start 2P", system-ui;
      font-size:12px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: rgba(234,255,241,.9);
      cursor:pointer;
    }

    @media (max-width: 980px){
      .layout{grid-template-columns: 1fr; }
      .shop{max-height: none}
      .bigCount{font-size:40px}
    }

  position: relative;

}

/* 3) Add this CSS (for the image icon inside the circle) */
.shopIconImg{
  width: 60px;
  height: 65px;
  object-fit: contain;        /* makes black svg white */

  user-select: none;
}

.charSwitch{
  position:absolute;

  top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:5;
}

.charSwitch button{
  font-family:"Press Start 2P", system-ui;
  font-size:10px;

  border-radius:12px;
  border:2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.25);
  color: #fff;
  cursor:pointer;
}
.charSwitch button:hover{
  background: rgba(255,255,255,.20);
}

@keyframes fadeInOut{
  0% {opacity:0; transform:translate(-50%, -30%) scale(.9);}
  10%,80% {opacity:1; transform:translate(-50%, 0%) scale(1);}
  100% {opacity:0; transform:translate(-50%, 10%) scale(1.1);}
}
#overlay{
  position:fixed;
  inset:0;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.3);
  display:none;
  z-index:9998;
}

  const cursorCount = owned("cursor");

  // BASE CLICK POWER
  let baseClick = 1 + cursorCount;

  // MULTIPLIERS (RECALCULATED EVERY TIME)
  let mult = 1;

  mult *= Math.pow(2, owned("sigma"));     // x2
  mult *= Math.pow(4, owned("sigma1"));    // x4
  mult *= Math.pow(6, owned("sixseven"));  // x6

  state.clickMult = mult;

  state.clickPower = baseClick * mult;

  // BPS
  state.bps =
    owned("auto") * 1 +
    owned("mine") * 10 +
    owned("valk") * 100;

  if (state.brainrot > state.record){
    state.record = state.brainrot;
  }
}

  if(!data || !data.time) return;

  // first load: remember it, but do not show it
  if(!announcementInitialized){
    lastAnnouncementTime = data.time;
    announcementInitialized = true;
    return;
  }

  // only show brand new announcements
  if(data.time !== lastAnnouncementTime){
    lastAnnouncementTime = data.time;
    showAnnouncement((data.by ? data.by + ": " : "") + data.text);
  }
});

const ADMIN_COMMANDS = [
  "help",
  "close",
  "money",
  "moneymax",
  "maxclick",
  "normalclick",
  "bps",
  "stopbps",
  "unlockall",

function renderAdminSuggestions(value){
  const q = value.trim().toLowerCase();

  if(!q){
    adminSuggestions.style.display = "none";
    adminSuggestions.innerHTML = "";
    return;
  }

  const matches = ADMIN_COMMANDS.filter(cmd => cmd.startsWith(q));

  if(matches.length === 0){
    adminSuggestions.style.display = "none";
    adminSuggestions.innerHTML = "";
    return;
  }

  adminSuggestions.style.display = "block";
  adminSuggestions.innerHTML = "";

  matches.forEach(cmd => {
    const div = document.createElement("div");
    div.textContent = cmd;
    div.style.padding = "10px 12px";
    div.style.cursor = "pointer";
    div.style.color = "#7ee7ff";
    div.style.borderBottom = "1px solid rgba(255,255,255,.05)";

    div.onmouseenter = () => {
      div.style.background = "rgba(126,231,255,.12)";
    };

    div.onmouseleave = () => {
      div.style.background = "transparent";
    };

    div.onclick = () => {
      adminCommandInput.value = cmd;
      adminSuggestions.style.display = "none";
      adminSuggestions.innerHTML = "";
      adminCommandInput.focus();
    };

    adminSuggestions.appendChild(div);
  });
}

  else if(cmd === "statsreset"){
    state.totalClicks = 0;
    state.totalEarned = 0;
    state.bestClick = 0;
    if(statsPopup.style.display === "block") renderStats();
    logAdmin("stats reset");

  else if(cmd === "reset"){
    state.brainrot = 0;

    state.clickMult = 1;
    state.owned = {};

const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSendBtn = document.getElementById("chatSendBtn");

function escapeHtml(text){
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function addChatMessage(name, text){
  const row = document.createElement("div");
  row.style.marginBottom = "8px";
  row.innerHTML = `<b style="color:#7ee7ff;">${escapeHtml(name)}:</b> <span>${escapeHtml(text)}</span>`;
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendChatMessage(){
  const text = chatInput.value.trim();
  if(!text) return;

  if(!playerName){
    alert("enter your name first");
    return;
  }

  // 🚫 BLOCK BAD WORDS (non-admin only)
  if(!adminUnlocked && containsBadWord(text)){
    alert("❌ you can't say that");
    return;
  }

  db.ref("brainrotClicker/chat").push({
    name: playerName,
    text: text,
    time: Date.now()
  });

  chatInput.value = "";
}

chatSendBtn.onclick = sendChatMessage;

chatInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    sendChatMessage();
  }
});

function clearChat(){
  const entered = prompt("Enter clear chat password:");
  if(entered === null) return;

  if(entered !== CHAT_CLEAR_PASSWORD){
    alert("Wrong password");
    return;
  }

  db.ref("brainrotClicker/chat").remove()
    .then(() => {
      chatMessages.innerHTML = "";
      alert("Chat cleared");
    })
    .catch(() => {
      alert("Failed to clear chat");
    });
}

chatClearBtn.onclick = clearChat;


db.ref("brainrotClicker/chat").limitToLast(40).on("value", (snapshot) => {
  chatMessages.innerHTML = "";

  const data = snapshot.val();
  if(!data) return;

  Object.values(data).forEach(msg => {
    addChatMessage(msg.name || "Player", msg.text || "");
  });

  chatMessages.scrollTop = chatMessages.scrollHeight;
});

adminCommandInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    runAdminCommand(adminCommandInput.value);
    adminCommandInput.value = "";
    adminSuggestions.style.display = "none";
    adminSuggestions.innerHTML = "";
  }
});
